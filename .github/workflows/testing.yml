name: Run Tests

on:
    push:
        branches:
          - 'main'
    pull_request:
        branches:
          - 'main'
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                enable-cache: true

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'

            - name: Install dependencies
              run: uv sync
            - name: Run tests
              run: uv run pytest tests/
